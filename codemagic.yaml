workflows:
  ios-release:
    name: iOS Release Build

    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        certificates:
          - ios_distribution_cert
        provisioning_profiles:
          - mothelper_profile

    integrations:
      app_store_connect: MOT Booking Helper

    scripts:
      - name: Get packages
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build iOS IPA
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa