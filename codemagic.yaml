workflows:
  ios-release:
    name: iOS Release Build

    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.dvapp.mothelper

    integrations:
      app_store_connect: MOT Booking Helper

    scripts:
      - name: Get packages
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build iOS IPA
        script: flutter build ipa --release --export-options-plist=ios/exportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa